# OpenEnv specification for the Startup Idea Validator environment.
# See: https://github.com/openenv/openenv-spec

spec_version: 1
name: startup-idea-validator
version: "1.0.0"
description: >
  An OpenEnv-compliant AI environment that evaluates startup ideas through
  step-based analysis of problem, solution, and market dimensions.

# Entry point for the Flask application
app: server.app:app

# ──────────────────────────────────────────────────────────────────────────
# Environment interface
# ──────────────────────────────────────────────────────────────────────────

environment:
  class: backend.environment.StartupEnv
  init_params:
    idea:
      type: string
      description: The startup idea to evaluate.
    use_llm:
      type: boolean
      default: true
      description: Whether to use LLM for generating analysis content.

  methods:
    reset:
      description: Reset the environment and return the initial state.
      returns: state

    step:
      description: Execute an action and return (state, reward, done).
      params:
        action:
          type: string
          enum: [analyze_problem, analyze_solution, analyze_market]
      returns: [state, reward, done]

    state:
      description: Return the current environment state.
      returns: state

# ──────────────────────────────────────────────────────────────────────────
# Action space
# ──────────────────────────────────────────────────────────────────────────

actions:
  - name: analyze_problem
    description: Perform problem-space analysis for the startup idea.
    reward: 0.33

  - name: analyze_solution
    description: Analyze the proposed solution and its differentiation.
    reward: 0.33

  - name: analyze_market
    description: Evaluate the market opportunity, TAM, competition.
    reward: 0.34

# ──────────────────────────────────────────────────────────────────────────
# Observation / State schema
# ──────────────────────────────────────────────────────────────────────────

observations:
  type: object
  properties:
    idea:
      type: string
      description: The startup idea being evaluated.
    analysis:
      type: object
      properties:
        problem:
          type: string
          description: Analysis of the problem the startup addresses.
        solution:
          type: string
          description: Analysis of the proposed solution.
        market:
          type: string
          description: Analysis of the market opportunity.

# ──────────────────────────────────────────────────────────────────────────
# Reward structure
# ──────────────────────────────────────────────────────────────────────────

rewards:
  type: partial
  total: 1.0
  breakdown:
    analyze_problem: 0.33
    analyze_solution: 0.33
    analyze_market: 0.34

# ──────────────────────────────────────────────────────────────────────────
# Tasks
# ──────────────────────────────────────────────────────────────────────────

tasks:
  - id: startup-easy-v0
    name: AI fitness startup
    description: Analyze the problem space only.
    difficulty: easy
    actions: [analyze_problem]
    max_reward: 1.0
    grader: backend.grader:EasyGrader

  - id: startup-medium-v0
    name: Food delivery platform
    description: Analyze problem and solution.
    difficulty: medium
    actions: [analyze_problem, analyze_solution]
    max_reward: 1.0
    grader: backend.grader:MediumGrader

  - id: startup-hard-v0
    name: Edtech app for students
    description: Full pipeline — problem, solution, and market.
    difficulty: hard
    actions: [analyze_problem, analyze_solution, analyze_market]
    max_reward: 1.0
    grader: backend.grader:HardGrader

# ──────────────────────────────────────────────────────────────────────────
# Agent
# ──────────────────────────────────────────────────────────────────────────

agent:
  class: backend.agent.Agent
  deterministic: true
  description: >
    Selects actions sequentially based on missing state fields:
    problem → solution → market.
